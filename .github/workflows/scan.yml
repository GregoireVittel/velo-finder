name: Scan offers

on:
  schedule:
    - cron: "17 5,11,17,23 * * *"   # 4x/day UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python scraper.py

      - name: Commit results
        run: |
          git config user.name "velo-finder-bot"
          git config user.email "actions@github.com"
          git add docs/offers.json
          git diff --cached --quiet || git commit -m "scan: $(date -u +'%Y-%m-%d %H:%M')"
          git push
